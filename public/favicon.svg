<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0a6bc"/>
      <stop offset="100%" stop-color="#d06e92"/>
    </linearGradient>
    <linearGradient id="petal" x1="24" y1="8" x2="24" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffe5ec" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- Lily / 百合 flower petals -->
  <g transform="translate(24,24)">
    <!-- 6 petals arranged in a circle -->
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petal)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petal)" transform="rotate(60)"/>
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petal)" transform="rotate(120)"/>
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petal)" transform="rotate(180)"/>
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petal)" transform="rotate(240)"/>
    <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petal)" transform="rotate(300)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="4" fill="#f7c6d5" stroke="#e8a0b8" stroke-width="0.5"/>
    <circle cx="0" cy="0" r="2" fill="#d97798"/>
  </g>
</svg>
